<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stop Alert</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body,html{
    margin:0;
    height:100%;
    font-family:sans-serif;
}

#map{
    height:100%;
}

/* PANEL */
.panel{
    position:absolute;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* SEARCH */
.search-box{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:10px;
}

#results{
    max-height:150px;
    overflow:auto;
    text-align:left;
}

.result{
    padding:8px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.result:hover{
    background:#f0f0f0;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#6366f1;
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<h3>STOP ALERT</h3>

<!-- ✅ SEARCH BAR -->
<input id="search" class="search-box" placeholder="Search destination...">

<div id="results"></div>

<h1 id="distance">-- km</h1>

<button id="start" disabled>Start Alarm</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([0,0],2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker, destMarker;

// 📍 USER LOCATION
map.locate({setView:true, maxZoom:16});

map.on('locationfound', e=>{
    if(!userMarker){
        userMarker = L.marker(e.latlng).addTo(map);
    } else {
        userMarker.setLatLng(e.latlng);
    }
});

// ================= SEARCH =================
const input = document.getElementById('search');
const results = document.getElementById('results');

let timer;

input.addEventListener('input', ()=>{
    clearTimeout(timer);

    const query = input.value;

    if(query.length < 3){
        results.innerHTML='';
        return;
    }

    timer = setTimeout(async ()=>{
        const res = await fetch(
            `https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=5`
        );

        const data = await res.json();

        results.innerHTML='';

        data.forEach(place=>{
            const div = document.createElement('div');
            div.className='result';
            div.innerText = place.display_name;

            div.onclick = ()=>{
                const latlng = [place.lat, place.lon];

                if(destMarker) map.removeLayer(destMarker);
                destMarker = L.marker(latlng).addTo(map);

                map.setView(latlng,16);

                document.getElementById('start').disabled=false;

                results.innerHTML='';
                input.value = place.display_name;
            };

            results.appendChild(div);
        });

    },400);
});

// ================= ALARM =================
document.getElementById('start').onclick = ()=>{
    navigator.geolocation.watchPosition(pos=>{
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        userMarker.setLatLng([lat,lon]);

        const dist = map.distance([lat,lon], destMarker.getLatLng());

        document.getElementById('distance').innerText =
            (dist/1000).toFixed(2) + " km";

        if(dist < 500){
            alert("WAKE UP!");
        }

    }, null, {enableHighAccuracy:true});
};
</script>

</body>
</html>
