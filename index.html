<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stop-Alert | Smart GPS Alarm</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #6366f1;
    --bg: #ffffff;
    --text: #1e293b;
    --panel: rgba(255,255,255,0.95);
    --border: rgba(0,0,0,0.1);
    --danger: #ef4444;
}

[data-theme="dark"] {
    --bg: #1e293b;
    --text: #f8fafc;
    --panel: rgba(30,41,59,0.95);
    --border: rgba(255,255,255,0.1);
    --primary: #818cf8;
}

body,html{
    margin:0;
    padding:0;
    height:100%;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
}

#map{
    height:100vh;
    width:100%;
}

.theme-toggle{
    position:absolute;
    top:20px;
    right:20px;
    z-index:1001;
    padding:10px;
    border-radius:50%;
    cursor:pointer;
}

.ui-overlay{
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:400px;
}

.glass-panel{
    background:var(--panel);
    backdrop-filter:blur(12px);
    border-radius:28px;
    padding:20px;
    text-align:center;
}

/* SEARCH */
.search-container{
    position:relative;
}

#dest-search{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid var(--border);
}

#search-results{
    position:absolute;
    bottom:100%;
    width:100%;
    background:white;
    border-radius:12px;
    max-height:200px;
    overflow-y:auto;
    display:none;
}

.result-item{
    padding:10px;
    border-bottom:1px solid #eee;
    cursor:pointer;
    font-size:0.8rem;
}

.result-item:hover{
    background:#f1f5f9;
}

#distance-display{
    font-size:2.5rem;
    font-weight:800;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:20px;
    font-weight:700;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-danger{
    background:var(--danger);
    color:white;
    display:none;
}

.user-dot{
    width:14px;
    height:14px;
    background:var(--primary);
    border-radius:50%;
}
</style>
</head>

<body data-theme="light">

<button class="theme-toggle" id="themeBtn">🌓</button>
<div id="map"></div>

<div class="ui-overlay">
<div class="glass-panel">

<h2>STOP ALERT</h2>

<div class="search-container">
<input type="text" id="dest-search" placeholder="Search destination...">
<div id="search-results"></div>
</div>

<div id="distance-display">-- km</div>

<button id="startBtn" class="btn btn-primary" disabled>Start Alarm</button>
<button id="stopBtn" class="btn btn-danger">Stop</button>

</div>
</div>

<div id="alarm-overlay" style="display:none;position:fixed;inset:0;background:red;color:white;align-items:center;justify-content:center;flex-direction:column;">
<h1>WAKE UP!</h1>
</div>

<audio id="alarmSound" loop src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([0,0],2);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker, destMarker, watchId;
const alarmSound = document.getElementById('alarmSound');

// 📍 Get user location
map.locate({setView:true, maxZoom:16});

map.on('locationfound', e=>{
    if(!userMarker){
        userMarker = L.marker(e.latlng).addTo(map);
    } else {
        userMarker.setLatLng(e.latlng);
    }
});

// ================= SEARCH SYSTEM =================

const searchInput = document.getElementById('dest-search');
const resultsBox = document.getElementById('search-results');

let debounceTimer;

searchInput.addEventListener('input', (e)=>{
    clearTimeout(debounceTimer);

    const query = e.target.value.trim();

    if(query.length < 3){
        resultsBox.style.display = 'none';
        return;
    }

    debounceTimer = setTimeout(async ()=>{
        try{
            const res = await fetch(
                `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`
            );

            const data = await res.json();

            resultsBox.innerHTML = '';

            if(data.length === 0){
                resultsBox.innerHTML = '<div class="result-item">No results</div>';
            }

            data.forEach(place=>{
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<b>${place.display_name.split(',')[0]}</b><br><small>${place.display_name}</small>`;

                div.onclick = ()=>{
                    const latlng = [parseFloat(place.lat), parseFloat(place.lon)];
                    setDestination(latlng);
                    searchInput.value = place.display_name;
                    resultsBox.style.display = 'none';
                };

                resultsBox.appendChild(div);
            });

            resultsBox.style.display = 'block';

        } catch(err){
            console.log(err);
        }
    }, 400);
});

// ================= DESTINATION =================

function setDestination(latlng){
    if(destMarker) map.removeLayer(destMarker);

    destMarker = L.marker(latlng).addTo(map);
    map.setView(latlng,16);

    document.getElementById('startBtn').disabled = false;
}

// ================= ALARM =================

document.getElementById('startBtn').onclick = ()=>{
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';

    watchId = navigator.geolocation.watchPosition(pos=>{
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;

        userMarker.setLatLng([lat,lon]);

        const dist = map.distance([lat,lon], destMarker.getLatLng());

        document.getElementById('distance-display').innerText = (dist/1000).toFixed(2) + " km";

        if(dist < 800){
            alarmSound.play();
            document.getElementById('alarm-overlay').style.display = 'flex';
        }

    }, null, {enableHighAccuracy:true});
};

document.getElementById('stopBtn').onclick = ()=>location.reload();

</script>

</body>
</html>
